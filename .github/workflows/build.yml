name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'aispeaker-gateway/src/**'
      - 'aispeaker-gateway/package.json'
      - 'aispeaker-gateway/Dockerfile'
      - 'aispeaker-gateway/config.json'
  workflow_dispatch:  # 手动触发

env:
  REGISTRY: crpi-f5kd64keui5oedie.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: yuanxin32323/aispeaker-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Read version from config.json
        id: version
        run: |
          VERSION=$(jq -r '.version' aispeaker-gateway/config.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./aispeaker-gateway
          file: ./aispeaker-gateway/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
